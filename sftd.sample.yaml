## Sample configuration file for sftd, the Okta Privileged Access Server Agent
## Copy this file to sftd.yaml and uncomment any customizations you need to make.

## ----------------------------------------
## Enrollment Options
## ----------------------------------------

## Automatically enrolls the server on initial startup.
#AutoEnroll: true

## Path to a file containing an enrollment token. Deleted after enrollment completes.
## Must be created manually with a token from the Okta Privileged Access platform.
#EnrollmentTokenFile: /var/lib/sftd/enrollment.token

## ----------------------------------------
## Log Options
## ----------------------------------------

## Log verbosity. Valid values: warn, info, debug
#LogLevel: info

## ----------------------------------------
## Connection Options
## ----------------------------------------

## Network address (IPv4/IPv6) for client access on multi-interface hosts or behind DNATs. (default is unset)
#AccessAddress:

## Interface used by clients to negotiate connections. Example: eth0
#AccessInterface:

## Alternative hostnames usable as targets for sft ssh.
## Example: AltNames: ["web01", "web01.example.com"]
#AltNames:

## Overrides the hostname command; sets the name clients use to connect. (default is unset)
## Example: CanonicalName: "opa_linux_1"
#CanonicalName:

## HTTP CONNECT proxy for outbound connectivity. Also configurable via HTTPS_PROXY env var. (default is unset)
## Example: ForwardProxy: https://myproxydomain.com:8080
#ForwardProxy:

## Path to the sshd configuration file. Note: The server agent modifies this file.
#SSHDConfigFile: /etc/ssh/sshd_config

## Custom SSH port if not using the default (22). Requires a matching change in sshd_config. (default is unset)
#SSHDPort:

## Path to the file storing trusted SSH Certificate Authorities.
#TrustedUserCAKeysFile: /var/lib/sftd/ssh_ca.pub

## ----------------------------------------
## Access Broker Options
## ----------------------------------------

## Port clients use to reach the access broker.
#BrokerAccessPort: 4421

## Network address (IPv4/IPv6) for the broker to listen on. Defaults to all interfaces. (default is unset)
#BrokerListenHost:

## Port the access broker listens on for connections.
#BrokerListenPort: 4421

## Max time (seconds) between authentication ticket issuance and OS session start.
#BrokeredLoginGracePeriodInSeconds: 15

## Set to True to prevent the access broker from running. Not recommended on Windows. (default is unset)
#DisableBroker:

## ----------------------------------------
## Domain Controller Options
## Valid values: deny, auto, allow
## Default of "auto" disables these features on detected domain controllers.
## ----------------------------------------

## Controls local user account management on this host.
#AccountManagement: auto

## Controls creation and sync of persistent user objects.
#PersistentAccount: auto

## Controls Just-In-Time (JIT) user account creation on this host.
#JITAccount: auto

## Controls assignment of managed accounts to admin or RDP groups.
#JITGroupMembership: auto

## ----------------------------------------
## Labels
## Custom key:value pairs for access control and server targeting.
## ----------------------------------------

#Labels:
#  env: "production"
#  team: "platform"
